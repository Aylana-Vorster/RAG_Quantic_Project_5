<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandbox Policy Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #818cf8;
            --primary-hover: #6366f1;
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --user-bubble: #6366f1;
            --bot-bubble: #334155;
            --input-bg: #1e293b;
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg-body); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            color: var(--text-main);
        }

        header { 
            background-color: var(--bg-card); 
            padding: 1rem 2rem; 
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            z-index: 10;
            border-bottom: 1px solid #334155;
        }

        header h1 { font-size: 1.25rem; margin: 0; font-weight: 600; color: var(--primary); }

        #chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 2rem; 
            display: flex; 
            flex-direction: column; 
            gap: 1.5rem; 
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .message-wrapper {
            display: flex;
            gap: 0.75rem;
            max-width: 85%;
        }

        .user-wrapper {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .assistant-wrapper {
            align-self: flex-start;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: var(--bg-card);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .user-avatar { background-color: var(--user-bubble); color: white; }
        .assistant-avatar { background-color: var(--bot-bubble); color: var(--primary); border: 1px solid #475569; }

        .message { 
            padding: 0.875rem 1.125rem; 
            border-radius: 1.25rem; 
            line-height: 1.5; 
            word-wrap: break-word; 
            font-size: 0.9375rem;
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .message p { margin: 0 0 0.5rem 0; }
        .message p:last-child { margin-bottom: 0; }
        .message ul, .message ol { margin: 0.5rem 0; padding-left: 1.25rem; }

        .user-message { 
            background-color: var(--user-bubble); 
            color: white; 
            border-bottom-right-radius: 0.25rem; 
        }

        .assistant-message { 
            background-color: var(--bot-bubble); 
            color: var(--text-main); 
            border-bottom-left-radius: 0.25rem; 
        }

        .citations { 
            margin-top: 0.75rem; 
            font-size: 0.8rem; 
            color: var(--text-muted); 
            border-top: 1px solid rgba(255,255,255,0.1); 
            padding-top: 0.5rem; 
            font-style: italic; 
        }

        .latency { 
            font-size: 0.7rem; 
            color: #64748b; 
            text-align: right; 
            margin-top: 0.25rem; 
        }

        #input-area-wrapper {
            background-color: var(--bg-card);
            border-top: 1px solid #334155;
            padding: 1.5rem;
        }

        #input-area { 
            max-width: 800px;
            margin: 0 auto;
            display: flex; 
            gap: 0.75rem; 
            background: #0f172a;
            padding: 0.5rem;
            border-radius: 1rem;
            align-items: center;
            border: 1px solid #334155;
        }

        #query-input { 
            flex: 1; 
            padding: 0.75rem; 
            border: none; 
            background: transparent;
            outline: none; 
            font-size: 0.9375rem; 
            font-family: inherit;
            color: white;
        }

        #send-btn { 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            width: 40px;
            height: 40px;
            border-radius: 0.75rem; 
            cursor: pointer; 
            transition: all 0.2s; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #send-btn:hover { background-color: var(--primary-hover); transform: scale(1.05); }
        #send-btn:active { transform: scale(0.95); }
        #send-btn:disabled { background-color: #cbd5e1; cursor: not-allowed; }

        .loading-dots { display: flex; gap: 4px; padding: 4px 0; }
        .dot { width: 6px; height: 6px; background: #94a3b8; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <header>
        <i data-lucide="bot" size="24"></i>
        <h1>Sandbox Policy Assistant</h1>
    </header>

    <div id="chat-container">
        <!-- Messages will be injected here -->
    </div>

    <div id="input-area-wrapper">
        <div id="input-area">
            <input type="text" id="query-input" placeholder="Ask me anything about company policies..." autocomplete="off">
            <button id="send-btn">
                <i data-lucide="send-horizontal" size="20"></i>
            </button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const queryInput = document.getElementById('query-input');
        const sendBtn = document.getElementById('send-btn');

        // Initialize lucide icons
        lucide.createIcons();

        function addMessage(text, isUser) {
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${isUser ? 'user-wrapper' : 'assistant-wrapper'}`;
            
            const avatar = document.createElement('div');
            avatar.className = `avatar ${isUser ? 'user-avatar' : 'assistant-avatar'}`;
            avatar.innerHTML = isUser ? '<i data-lucide="user" size="20"></i>' : '<i data-lucide="sparkles" size="20"></i>';
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'assistant-message'}`;
            
            if (isUser) {
                messageDiv.innerText = text;
            }

            wrapper.appendChild(avatar);
            wrapper.appendChild(messageDiv);
            chatContainer.appendChild(wrapper);
            lucide.createIcons();
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            return messageDiv;
        }

        // Initial welcome message
        const welcomeDiv = addMessage('', false);
        welcomeDiv.innerHTML = marked.parse("Hello! I'm your Sandbox policy assistant. How can I help you today?");

        async function typeWriter(text, element, citations = [], latency = null) {
            const words = text.split(' ');
            let currentText = '';
            
            for (let i = 0; i < words.length; i++) {
                currentText += words[i] + ' ';
                element.innerHTML = marked.parse(currentText);
                chatContainer.scrollTop = chatContainer.scrollHeight;
                await new Promise(resolve => setTimeout(resolve, 30));
            }
            
            let finalExtra = '';
            if (citations.length > 0) {
                finalExtra += `<div class="citations"><strong>Sources:</strong> ${citations.join(', ')}</div>`;
            }
            if (latency) {
                finalExtra += `<div class="latency">Processed in ${latency}ms</div>`;
            }
            
            if (finalExtra) {
                element.innerHTML += finalExtra;
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        async function handleSend() {
            const query = queryInput.value.trim();
            if (!query) return;

            addMessage(query, true);
            queryInput.value = '';
            queryInput.disabled = true;
            sendBtn.disabled = true;

            // Loading state
            const loadingWrapper = document.createElement('div');
            loadingWrapper.className = 'message-wrapper assistant-wrapper';
            loadingWrapper.innerHTML = `
                <div class="avatar assistant-avatar"><i data-lucide="sparkles" size="20"></i></div>
                <div class="message assistant-message">
                    <div class="loading-dots">
                        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                    </div>
                </div>
            `;
            chatContainer.appendChild(loadingWrapper);
            lucide.createIcons();
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });

                const data = await response.json();
                chatContainer.removeChild(loadingWrapper);

                if (data.error) {
                    const errorDiv = addMessage('', false);
                    errorDiv.innerHTML = `<span style="color: #ef4444;">Error: ${data.error}</span>`;
                } else {
                    const assistantDiv = addMessage('', false);
                    await typeWriter(data.answer, assistantDiv, data.citations, data.latency_ms);
                }
            } catch (error) {
                chatContainer.removeChild(loadingWrapper);
                const errorDiv = addMessage('', false);
                errorDiv.innerText = 'Error: Failed to connect to server.';
            } finally {
                queryInput.disabled = false;
                sendBtn.disabled = false;
                queryInput.focus();
            }
        }

        sendBtn.addEventListener('click', handleSend);
        queryInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
