name: RAG Application CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Build Check
      run: |
        # Check if ingestion script runs (mocking data if needed)
        python ingest.py --help || true
    - name: Flask App Check
      run: |
        # Basic check to see if app.py can be imported without syntax errors
        python -c "import app"
